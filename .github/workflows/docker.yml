name: Docker Build and Push
on:
  workflow_dispatch:
  push:
    branches:
      - '*'
  pull_request:
  # Enabling this has some security implications.  For now we'll leave it off.
  #pull_request_target:
  #  types: [labeled]
  schedule:
    - cron: '42 06 * * sat' # Run every Saturday at 06:42 UTC
env:
  GHCR_REGISTRY: ghcr.io
jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry (GHCR)
      uses: docker/login-action@v4
      with:
        registry: ${{ env.GHCR_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Docker Hub
      if: vars.DOCKERHUB_USERNAME != ''
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ env.GHCR_REGISTRY }}/${{ github.repository }}
          ${{ vars.DOCKERHUB_USERNAME != '' && format('{0}/pharos', vars.DOCKERHUB_USERNAME) || '' }}
        flavor: |
          suffix=-${{ matrix.arch }},onlatest=true
        tags: |
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ matrix.arch }}-dev,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build-and-push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: ${{ github.event_name == 'push' || ( github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'push to docker'))}}
        build-args: |
          CFLAGS=
          NCPU=4
        provenance: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/${{ matrix.arch }}
        # Don't use cache for weekly builds
        cache-from: ${{ (github.event_name != 'schedule') && format('type=gha,scope={0}-{1}', github.workflow, matrix.arch) }}
        cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.arch }}

    - name: Log Docker image digest
      if: steps.build-and-push.outputs.pushed
      run: echo "Docker image pushed ${{ steps.build-and-push.outputs.digest }}"

    - name: Extract metadata for dev image
      id: meta-dev
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.GHCR_REGISTRY }}/${{ github.repository }}
        flavor: |
          suffix=-${{ matrix.arch }}-dev,onlatest=false
        tags: |
          type=ref,event=branch
          type=ref,event=pr

    - name: Build and push dev image
      if: github.event_name == 'push' || ( github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'push to docker'))
      uses: docker/build-push-action@v7
      with:
        context: .
        target: dev
        push: true
        build-args: |
          CFLAGS=
          NCPU=4
        provenance: false
        tags: ${{ steps.meta-dev.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/${{ matrix.arch }}
        cache-from: ${{ (github.event_name != 'schedule') && format('type=gha,scope={0}-{1}-dev', github.workflow, matrix.arch) }}
        cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.arch }}-dev

  create-manifest:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || ( github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'push to docker'))
    steps:
      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository }}
            ${{ vars.DOCKERHUB_USERNAME != '' && format('{0}/pharos', vars.DOCKERHUB_USERNAME) || '' }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push manifests
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for TAG in $TAGS; do
            docker manifest create $TAG ${TAG}-amd64 ${TAG}-arm64
            docker manifest push $TAG
          done

  create-dev-manifest:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || ( github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'push to docker'))
    steps:
    - name: Login to GitHub Container Registry (GHCR)
      uses: docker/login-action@v4
      with:
        registry: ${{ env.GHCR_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for dev manifest
      id: meta-dev
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.GHCR_REGISTRY }}/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr

    - name: Create and push dev manifests
      env:
        TAGS: ${{ steps.meta-dev.outputs.tags }}
      run: |
        for TAG in $TAGS; do
          docker manifest create ${TAG}-dev ${TAG}-amd64-dev ${TAG}-arm64-dev
          docker manifest push ${TAG}-dev
        done

  test:
    needs: [build]
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Login to GitHub Container Registry (GHCR)
      uses: docker/login-action@v4
      with:
        registry: ${{ env.GHCR_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for dev image
      id: meta-dev
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.GHCR_REGISTRY }}/${{ github.repository }}
        flavor: |
          suffix=-${{ matrix.arch }}-dev,onlatest=false
        tags: |
          type=ref,event=branch
          type=ref,event=pr

    - name: Pull dev image
      run: docker pull ${{ steps.meta-dev.outputs.tags }}

    - name: Run tests
      run: docker run --rm ${{ steps.meta-dev.outputs.tags }} ctest --output-on-failure -j 4
